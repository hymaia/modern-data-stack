# generated by terraform from infra/templates/dagster-values.yaml.tpl

dagster:
  postgresql:
    enabled: false
    postgresqlHost: "dagster.cnogqssgrgs3.eu-west-1.rds.amazonaws.com"
    postgresqlUsername: "dagster"
    postgresqlDatabase: "dagster"

  serviceAccount:
    create: false
    name: "dagster-code-location"

  dagster-user-deployments:
    deployments:
      - name: "orchestration-dagster"
        image:
          repository: "662195598891.dkr.ecr.eu-west-1.amazonaws.com/hymaia/orchestration-dagster"
          tag: "latest"
          pullPolicy: Always
        dagsterApiGrpcArgs:
          - "-m"
          - "orchestration_dagster.definitions"
        port: 3030
      - name: "github-dbt-project"
        image:
          repository: "662195598891.dkr.ecr.eu-west-1.amazonaws.com/hymaia/github-dbt-project"
          tag: "latest"
          pullPolicy: Always
        dagsterApiGrpcArgs:
          - "-m"
          - "dagster_defs.definitions"
        port: 3031

  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
      alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:eu-west-1:662195598891:certificate/ce9e8ffd-1985-499b-999c-341218134e42"
    dagsterWebserver:
      host: dagster.fcussac.app.hymaia.com

global:
  postgresqlSecretName: "dagster-postgresql-secret"
  serviceAccountName: "dagster-code-location"
  roleIamDagster: "arn:aws:iam::662195598891:role/hyma-mds-dagster-code-location-role"
  roleIamPolars: "arn:aws:iam::662195598891:role/hyma-mds-polars-jobs"
